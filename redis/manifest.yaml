apiVersion: v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # these are replicaset labels
  labels:
    project: roboshop
    tier: databse
    component: redis

  spec:
    replicas: 1
    selector:
    # using these labels replica set selects the pod
      matchLabels:
      project: roboshop
      tier: databse
      component: redis  

  # the below are pod definition, pod is subset of replicaset
    template:
      metadata:
        labels:
          project: roboshop
          tier: databse
          component: redis
      spec:
        containers:
        - name: redis
          image: redis:7.0

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: databse
    component: redis
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: databse
    component: redis
  ports:
  - protocol: TCP
    port: 6379 # servie port
    targetPort: 6379 # container port