apiVersion: v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  # these are replicaset labels
  labels:
    project: roboshop
    tier: databse
    component: mongodb

  spec:
    replicas: 1
    selector:
    # using these labels replica set selects the pod
      matchLabels:
      project: roboshop
      tier: databse
      component: mongodb  

  # the below are pod definition, pod is subset of replicaset
    template:
      metadata:
        labels:
          project: roboshop
          tier: databse
          component: mongodb
      spec:
        containers:
        - name: mongodb
          image: nagendra2244/mongodb:1.0.0

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: databse
    component: mongodb
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: databse
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017 # servie port
    targetPort: 27017 # container port