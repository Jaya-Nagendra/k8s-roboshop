
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    tier: frontend
    component: frontend
data: 
  MONGO: "true" 
  MONGO_URL: "mongodb://mongodb:27017/frontend"
 
  

apiVersion: v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  # these are replicaset labels
  labels:
    project: roboshop
    tier: backend
    component: frontend

  spec:
    replicas: 1
    selector:
    # using these labels replica set selects the pod
      matchLabels:
      project: roboshop
      tier: backend
      component: frontend  

  # the below are pod definition, pod is subset of replicaset
    template:
      metadata:
        labels:
          project: roboshop
          tier: backend
          component: frontend
      spec:
        containers:
        - name: frontend
          image: nagendra2244/frontend:1.0.0
          imagePullPolicy: Always # safe to pull everytime, there may be images with same version rebuilt and pushed.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          readinessProbe: 
            httpGet:
              # path: /health
              # port: 8080
            tcpSocket:
              port: 80
            failureThreshold: 2
            peroidSecond: 10
            initialDelaySeconds: 15 
          livenessProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 2
            periodSeconds: 10


          envFrom:
          - configMapRef:
            name: frontend

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: frontend
spec:
  type: LoadBalancer
  selector:
    # labels are used as selectors
    project: roboshop
    tier: backend
    component: frontend
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port